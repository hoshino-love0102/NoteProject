<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>호시노 팬가입</title>
  <link rel="stylesheet" href="../css/signup.css" />
</head>
<body>
  <div class="signup-container">
    <!-- 이미지 영역 -->
    <div class="image-section">
      <img src="../img/hoshino.jpeg" alt="Hoshino" />
      <div class="overlay-text">
        <h1>호시노 팬가입</h1>
        <p>으헤 고래조아~~</p>
      </div>
    </div>

    <!-- 폼 영역 -->
    <div class="form-section">
      <h2>회원가입</h2>
      <form id="signupForm">
        <input type="text" placeholder="닉네임" required />
        <input type="text" id="birth" name="birth" placeholder="생년월일 (예: 2005-03-15)" pattern="\d{4}-\d{2}-\d{2}" required/>
        <input type="text" id="userId" placeholder="아이디" required />
        <input type="password" id="password" placeholder="비밀번호" required />
        <button type="submit">회원가입</button>
      </form>
      <p class="login-link">이미 계정이 있으신가요? <a href="../html/login.html">로그인</a></p>
    </div>
  </div>

   <script src="../script/loginjs.js"></script>
</body>
</html>
